name: Auto Refresh Financial Data

on:
  workflow_dispatch:
  schedule:
    - cron: "15 23 * * *"

permissions:
  contents: write

concurrency:
  group: auto-refresh-data
  cancel-in-progress: false

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Refresh data.js
        run: node scripts/auto-refresh-data.mjs

      - name: Commit changes if data updated
        run: |
          if git diff --quiet -- data.js; then
            echo "No data update."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.js
          git commit -m "chore(data): auto refresh quarterly financials"
          git push
